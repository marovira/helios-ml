name: "Tests"

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'README.rst'
      - '.pre-commit-config.yaml'
      - 'data/**'
      - 'LICENSE'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README.md'
      - 'README.rst'
      - '.pre-commit-config.yaml'
      - 'data/**'
      - 'LICENSE'
  workflow_call:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies/Helios
        run: |
          uv sync --group ci --no-editable --locked

      - name: Ruff
        run: |
          uv run ruff check src/helios test # examples
          uv run ruff format --check src/helios test examples

      - name: Mypy
        run: |
          uv run mypy src/helios
          uv run mypy test
          # uv run mypy examples

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies/Helios
        run: |
          uv sync --group ci --no-editable --locked

      - name: Pytest
        run: |
          uv run python -m pytest
