name: Bug Report
description: Report incorrect or unexpected behaviour in Helios.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as
        possible so the issue can be reproduced and fixed quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What is happening, and what did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: A minimal, self-contained code example that demonstrates the issue.
      render: python
      placeholder: |
        import helios

        # Minimal example that triggers the bug
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error Output
      description: >
        Paste the full traceback or error message here, if applicable.
      render: text

  - type: input
    id: helios-version
    attributes:
      label: Helios Version
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.11"
    validations:
      required: true

  - type: input
    id: torch-version
    attributes:
      label: PyTorch Version
      placeholder: "e.g. 2.6.0+cu128"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that may be relevant (hardware, config, etc.).
