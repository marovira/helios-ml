name: Feature Request
description: Propose a new feature or improvement to Helios.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to Helios. Please describe your proposal
        in as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: >
        What problem does this feature solve? Describe the limitation or gap in the
        current API.
      placeholder: >
        e.g. There is currently no way to do X, which means I have to work around it
        by doing Y.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: >
        Describe the feature you would like to see. If you have a specific API in mind,
        include a sketch.
      render: python
      placeholder: |
        # Example of how the proposed API might look
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: >
        Describe any alternative solutions or workarounds you have already considered,
        and why they are insufficient.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: >
        Any other information, references, or examples that support this proposal.
